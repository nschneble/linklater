<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linklater — Save links now, read them later.</title>
    <meta
      name="description"
      content="Linklater is a personal read-it-later app. Save links from anywhere, search and filter your collection, and let Linklater pick something at random when you can't decide what to read."
    />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Linklater" />
    <meta
      property="og:title"
      content="Linklater — Save links now, read them later."
    />
    <meta
      property="og:description"
      content="Linklater is a personal read-it-later app. Save links from anywhere, search and filter your collection, and let Linklater pick something at random when you can't decide what to read."
    />
    <meta property="og:url" content="https://github.com/nschneble/linklater" />
    <meta
      property="og:image"
      content="https://github.com/nschneble/linklater/blob/main/preview.jpg"
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Linklater — Save links now, read them later."
    />
    <meta
      name="twitter:description"
      content="Linklater is a personal read-it-later app. Save links from anywhere, search and filter your collection, and let Linklater pick something at random when you can't decide what to read."
    />
    <meta
      name="twitter:image"
      content="https://github.com/nschneble/linklater/blob/main/preview.jpg"
    />

    <link rel="icon" type="image/svg+xml" href="/linklater.svg" />
    <script
      src="https://kit.fontawesome.com/d78dc22bd8.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
